name: CodeQL

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: "30 2 * * 1"

jobs:
  analyze-python:
    name: Analyze Python
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  analyze-swift:
    name: Analyze Swift
    runs-on: macos-latest

    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift

      - name: Build Swift app
        run: |
          xcodebuild \
            -project App/Pulse.xcodeproj \
            -scheme App \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath /tmp/PulseDerivedData \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4